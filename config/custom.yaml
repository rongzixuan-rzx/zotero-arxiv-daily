zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["2026/survey/**","2026/reading-group/**"]

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE}
  generation_kwargs:
    model: gpt-4o-mini

source:
  arxiv:
    category: ["cs.CR","cs.SE","cs.PL"]
    include_cross_list: false
    start_date: "2024-01-01"
    end_date: null
    include_keywords: null
    required_keyword_groups:
      - ["smart contract", "solidity", "evm"]
      - ["vulnerability", "security", "audit", "auditing", "bug", "detection"]
    exclude_keywords: ["malware", "intrusion detection", "vehicle", "internet of vehicles", "medical"]
    priority_keywords:
      - "smart contract vulnerability"
      - "smart contract security"
      - "solidity"
      - "evm"
      - "symbolic execution"
      - "formal verification"
      - "program analysis"
    candidate_pool_size: 200
    max_results: 500
  openalex:
    journals:
      - "IEEE Transactions on Software Engineering"
      - "ACM Transactions on Software Engineering and Methodology"
      - "Empirical Software Engineering"
      - "Computers & Security"
    conferences:
      - "ICSE"
      - "ASE"
      - "ISSTA"
      - "USENIX Security Symposium"
      - "ACM SIGSAC Conference on Computer and Communications Security"
      - "Network and Distributed System Security Symposium"
      - "WWW"
    source_ids: null
    start_date: "2024-01-01"
    end_date: null
    include_keywords: null
    required_keyword_groups:
      - ["smart contract", "solidity", "evm"]
      - ["vulnerability", "security", "audit", "auditing", "bug", "detection"]
    exclude_keywords: ["malware", "intrusion detection", "vehicle", "internet of vehicles", "medical"]
    priority_keywords:
      - "smart contract vulnerability"
      - "smart contract security"
      - "solidity"
      - "evm"
      - "symbolic execution"
      - "formal verification"
      - "program analysis"
    candidate_pool_size: 100
    max_pages: 2
    per_page: 50
    work_types: ["article","proceedings-article"]

executor:
  debug: ${oc.env:DEBUG,null}
  source: ['arxiv', 'openalex']
